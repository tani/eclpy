name: CI

"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 6.0.1
          actions-cache-folder: emsdk-cache

      - name: Install dependencies
        run: uv sync --locked --dev --extra repl --no-install-project

      - name: Verify Emscripten
        run: emcc -v

      - name: Build WebAssembly runtime
        run: uv run --no-sync python scripts/build_ecl_wasm.py

      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Type check
        run: uv run --no-sync basedpyright

      - name: Unit tests
        run: uv run --no-sync python -m unittest discover -s tests

      - name: Coverage
        run: |
          uv run --no-sync coverage run -m unittest discover -s tests
          uv run --no-sync coverage report -m
