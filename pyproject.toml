[project]
name = "ecl"
version = "0.1.0"
description = "Evaluate Common Lisp from Python through an ECL WebAssembly runtime"
readme = "README.md"
license = "LGPL-2.1-or-later"
license-files = ["LICENSE", "COPYING"]
requires-python = ">=3.14"
dependencies = [
    "lark>=1.2.2",
    "wasmtime>=45.0.0",
]
classifiers = [
    "License :: OSI Approved :: GNU Lesser General Public License v2 or later (LGPLv2+)",
    "Programming Language :: Python :: 3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ecl"]
artifacts = ["ecl/ecl_eval.wasm"]
