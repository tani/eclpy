[project]
name = "eclpy"
version = "0.1.0"
description = "Evaluate Common Lisp from Python through an ECL WebAssembly runtime"
readme = "README.rst"
license = "LGPL-2.1-or-later"
license-files = ["LICENSE", "COPYING"]
requires-python = ">=3.14"
dependencies = [
    "lark>=1.2.2",
    "wasmtime>=45.0.0",
]
classifiers = [
    "License :: OSI Approved :: GNU Lesser General Public License v2 or later (LGPLv2+)",
    "Programming Language :: Python :: 3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["eclpy"]
artifacts = ["eclpy/ecl_eval.wasm"]

[dependency-groups]
dev = [
    "coverage>=7.14.3",
    "ruff>=0.15.20",
]

[tool.coverage.run]
source = ["eclpy"]

[tool.coverage.report]
fail_under = 100
show_missing = true

[tool.ruff]
line-length = 100
extend-exclude = ["vendor"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "ANN401",
    "COM812",
    "D203",
    "D213",
    "ISC001",
    "D105",
    "D107",
]

[tool.ruff.lint.per-file-ignores]
"eclpy/api.py" = ["SLF001"]
"eclpy/decode.py" = ["C901", "PLR09", "SLF001"]
"eclpy/encode.py" = ["C901", "PLR09"]
"eclpy/objects.py" = ["SLF001"]
"eclpy/simple.py" = ["C901", "PLR0911"]
"scripts/**/*.py" = [
    "D",
    "S603",
    "S607",
    "T201",
]
"tests/**/*.py" = [
    "ANN",
    "ARG",
    "D",
    "EM",
    "FBT003",
    "N812",
    "PLR2004",
    "PT",
    "SIM117",
    "SLF001",
    "TRY",
]
